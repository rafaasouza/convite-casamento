<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      background: #f7ecef;
      font-family: Arial, sans-serif;
    }

    .container {
      position: relative;
      max-width: 400px;
      width: 100%;
      cursor: pointer;
    }

    img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .hidden {
      display: none;
    }

    .link-area {
      position: absolute;
      left: 8%;
      width: 84%;
      height: 7%;
      display: block;
    }
  </style>
</head>

<body>

<div class="container" onclick="abrirConvite()">

  <!-- LAÇO -->
  <img id="capa" src="convite.1.jpg" alt="Clique para abrir">

  <!-- CONVITE -->
  <div id="conviteWrapper" class="hidden" style="position: relative;">
    <img id="convite" src="convite.2.jpg" alt="Convite">

    <!-- 📍 CERIMÔNIA -->
    <a class="link-area"
       href="https://www.google.com/maps/place/Par%C3%B3quia+Santo+Ant%C3%B4nio+De+Gopo%C3%BAva"
       target="_blank"
       style="top: 56%;">
    </a>

    <!-- 🚗 RECEPÇÃO -->
    <a class="link-area"
       href="https://www.google.com/maps/dir/Par%C3%B3quia+Santo+Ant%C3%B4nio+De+Gopo%C3%BAva/R.+Paulo+Lenk,+161"
       target="_blank"
       style="top: 66%;">
    </a>

    <!-- 🎁 LISTA -->
    <a class="link-area"
       href="https://noivos.casar.com/karine-e-rafael-2026-08-15"
       target="_blank"
       style="top: 79%;">
    </a>

  </div>

</div>

<script>
  function abrirConvite() {
    document.getElementById("capa").classList.add("hidden");
    document.getElementById("conviteWrapper").classList.remove("hidden");
  }
</script>

</body>
</html>
